<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>leprTodo — LeaperStuff</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    #lists-bar {
      display: flex; align-items: center; gap: var(--space-1);
      padding: var(--space-2) var(--space-6);
      background: var(--bg-surface); border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    #lists-bar::-webkit-scrollbar { display: none; }

    .list-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: var(--r-pill);
      font-size: var(--text-xs); font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--border); background: var(--bg-elevated);
      color: var(--text-secondary); white-space: nowrap;
      transition: all var(--dur-fast) var(--ease);
    }
    .list-pill:hover { border-color: var(--accent); color: var(--accent); }
    .list-pill.active { background: var(--accent-subtle); border-color: rgba(245,166,35,.3); color: var(--accent); }
    .list-pill-del {
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,255,255,.1); display: inline-flex;
      align-items: center; justify-content: center; font-size: 9px; cursor: pointer;
      transition: background var(--dur-fast) var(--ease);
    }
    .list-pill-del:hover { background: var(--error-subtle); color: var(--error); }

    #add-list-btn {
      padding: 5px 12px; border-radius: var(--r-pill);
      font-size: var(--text-xs); font-weight: 600;
      border: 1.5px dashed var(--border); background: none;
      color: var(--text-tertiary); cursor: pointer; white-space: nowrap;
      transition: all var(--dur-fast) var(--ease); font-family: var(--font);
    }
    #add-list-btn:hover { border-color: var(--accent); color: var(--accent); }

    #main { flex: 1; overflow-y: auto; padding: var(--space-6) var(--space-6) 0; }
    #main-inner { max-width: 660px; margin: 0 auto; }

    #add-bar {
      display: flex; align-items: center; gap: var(--space-3);
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-5); transition: border-color var(--dur-fast) var(--ease);
    }
    #add-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,166,35,.1); }
    #task-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text-primary); font-size: var(--text-base); font-family: var(--font);
    }
    #task-input::placeholder { color: var(--text-tertiary); }

    .task-item {
      display: flex; align-items: flex-start; gap: var(--space-3);
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: var(--space-4); margin-bottom: var(--space-2);
      transition: all var(--dur-fast) var(--ease);
      animation: wf-slide-up var(--dur-mid) var(--ease);
    }
    .task-item:hover { border-color: var(--border-strong); }
    .task-item.done { opacity: .5; }
    .task-item.done .task-title { text-decoration: line-through; color: var(--text-tertiary); }

    .task-check {
      appearance: none; -webkit-appearance: none;
      width: 20px; height: 20px; min-width: 20px; border-radius: 50%;
      border: 2px solid var(--border-strong); background: var(--bg-input);
      cursor: pointer; display: grid; place-items: center; margin-top: 2px;
      transition: all var(--dur-fast) var(--ease);
    }
    .task-check:checked { background: var(--accent); border-color: var(--accent); }
    .task-check:checked::after {
      content: ''; display: block; width: 5px; height: 9px;
      border-right: 2px solid var(--text-on-accent);
      border-bottom: 2px solid var(--text-on-accent);
      transform: rotate(45deg) translate(-1px,-1px);
    }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: var(--text-sm); font-weight: 500; color: var(--text-primary); word-break: break-word; }
    .task-desc { font-size: var(--text-xs); color: var(--text-tertiary); margin-top: 3px; line-height: 1.5; }
    .task-meta { display: flex; align-items: center; gap: var(--space-2); margin-top: var(--space-2); flex-wrap: wrap; }
    .task-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

    .tact {
      width: 28px; height: 28px; border-radius: var(--r-sm);
      background: none; border: none; cursor: pointer; color: var(--text-tertiary);
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      transition: all var(--dur-fast) var(--ease);
    }
    .tact:hover { background: var(--bg-elevated); color: var(--text-primary); }
    .tact.del:hover { background: var(--error-subtle); color: var(--error); }

    .prio-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ph { background: var(--error); } .pm { background: var(--warning); } .pl { background: var(--success); }

    .remind-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: var(--r-pill);
      background: var(--info-subtle); color: var(--info); font-size: 10px; font-weight: 600;
    }
    .repeat-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: var(--r-pill);
      background: var(--accent-subtle); color: var(--accent); font-size: 10px; font-weight: 600;
    }

    #empty { text-align: center; padding: var(--space-16) 0; color: var(--text-tertiary); display: none; flex-direction: column; align-items: center; gap: var(--space-3); }
    #empty.show { display: flex; }
    #empty svg { opacity: .3; }

    #hide-btn.active { background: var(--accent-subtle); color: var(--accent); border-color: rgba(245,166,35,.3); }

    #footer {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      gap: var(--space-3); padding: var(--space-3) var(--space-6);
      border-top: 1px solid var(--border); background: var(--bg-surface);
    }

    .wf-modal { max-width: 460px; }
    .wf-form-group + .wf-form-group { margin-top: var(--space-4); }

    .notif-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-4);
    }
    .notif-row-text { font-size: var(--text-sm); color: var(--text-secondary); }
    .notif-row-status { font-size: var(--text-xs); margin-top: 2px; }

    /* Repeat section */
    .repeat-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3);
    }
    .repeat-days {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: var(--space-2);
    }
    .day-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border);
      background: var(--bg-elevated); color: var(--text-tertiary);
      font-size: var(--text-xs); font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--dur-fast) var(--ease); font-family: var(--font);
    }
    .day-btn.on { background: var(--accent); border-color: var(--accent); color: var(--text-on-accent); }
  </style>
</head>
<body>

<nav class="wf-navbar">
  <div class="wf-navbar-inner">
    <a href="#" class="wf-navbar-brand">
      <img src="/assets/roundedlogo.gif" alt="LeaperStuff" class="wf-navbar-favicon" />
      <span class="wf-navbar-name">leprTodo</span>
    </a>
    <div class="wf-navbar-actions">
      <button id="hide-btn" class="wf-btn wf-btn-outlined wf-btn-sm" onclick="toggleHide()" data-tooltip="Hide completed">
        <span id="hide-icon">−</span> Completed
      </button>
    </div>
  </div>
</nav>

<div id="lists-bar">
  <button id="add-list-btn" onclick="promptList()">＋ New list</button>
</div>

<div id="main">
  <div id="main-inner">
    <div id="add-bar">
      <input id="task-input" type="text" placeholder="Add a task…" maxlength="200"
        onkeydown="if(event.key==='Enter')quickAdd()" />
      <button class="tact" onclick="openModal()" data-tooltip="Task options" style="font-size:18px;width:34px;height:34px;">⚙️</button>
      <button class="tact" onclick="quickAdd()" data-tooltip="Add task" style="font-size:18px;width:34px;height:34px;color:var(--accent);">💬</button>
    </div>
    <div id="task-list"></div>
    <div id="empty">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 9h18"/>
        <path d="M8 13h.01M12 13h.01M16 13h.01M8 17h.01M12 17h.01"/>
      </svg>
      <span class="wf-body-sm">No tasks here. Add one above!</span>
    </div>
  </div>
</div>

<footer id="footer">
  <button class="wf-btn wf-btn-ghost wf-btn-sm" onclick="backup()" data-tooltip="Export tasks as JSON">⬇ Backup</button>
  <div style="width:1px;height:18px;background:var(--border);"></div>
  <button class="wf-btn wf-btn-ghost wf-btn-sm" onclick="document.getElementById('restore-input').click()" data-tooltip="Import tasks from JSON">⬆ Restore</button>
  <input id="restore-input" type="file" accept=".json" style="display:none" onchange="restore(event)" />
  <span class="wf-caption" id="task-count"></span>
</footer>

<!-- TASK MODAL -->
<div class="wf-modal-backdrop wf-hidden" id="task-modal" onclick="if(event.target===this)closeModal()">
  <div class="wf-modal">
    <div class="wf-modal-header">
      <span class="wf-modal-title" id="modal-ttl">New Task</span>
      <button class="wf-modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="wf-modal-body">

      <!-- Notification row -->
      <div class="notif-row">
        <div>
          <div class="notif-row-text">🔔 Reminders</div>
          <div class="notif-row-status wf-helper" id="notif-status"></div>
        </div>
        <button class="wf-btn wf-btn-sm" id="notif-btn" onclick="reqNotif()">Enable</button>
      </div>

      <div class="wf-form-group">
        <label class="wf-label">Task <span class="required">*</span></label>
        <input id="m-title" class="wf-input" type="text" placeholder="Task title" maxlength="200" />
      </div>
      <div class="wf-form-group">
        <label class="wf-label">Description</label>
        <textarea id="m-desc" class="wf-textarea" placeholder="Optional description…" style="min-height:66px;"></textarea>
      </div>

      <div class="repeat-grid">
        <div class="wf-form-group">
          <label class="wf-label">Priority</label>
          <div class="wf-select-wrapper">
            <select id="m-prio" class="wf-select">
              <option value="none">None</option>
              <option value="low">Low</option>
              <option value="med">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="wf-form-group">
          <label class="wf-label">List</label>
          <div class="wf-select-wrapper">
            <select id="m-list" class="wf-select"></select>
          </div>
        </div>
      </div>

      <div class="wf-form-group">
        <label class="wf-label">Reminder date &amp; time</label>
        <input id="m-remind" class="wf-input" type="datetime-local" />
      </div>

      <!-- Repeat -->
      <div class="wf-form-group">
        <label class="wf-label">Repeat</label>
        <div class="wf-select-wrapper">
          <select id="m-repeat" class="wf-select" onchange="toggleRepeatDays()">
            <option value="none">No repeat</option>
            <option value="daily">Daily</option>
            <option value="weekdays">Weekdays (Mon–Fri)</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="custom">Custom days…</option>
          </select>
        </div>
      </div>
      <div id="repeat-days-row" class="wf-hidden">
        <label class="wf-label" style="margin-bottom:var(--space-2);">Days of week</label>
        <div class="repeat-days" id="repeat-days">
          <button class="day-btn" data-d="0" onclick="toggleDay(this)">Su</button>
          <button class="day-btn" data-d="1" onclick="toggleDay(this)">Mo</button>
          <button class="day-btn" data-d="2" onclick="toggleDay(this)">Tu</button>
          <button class="day-btn" data-d="3" onclick="toggleDay(this)">We</button>
          <button class="day-btn" data-d="4" onclick="toggleDay(this)">Th</button>
          <button class="day-btn" data-d="5" onclick="toggleDay(this)">Fr</button>
          <button class="day-btn" data-d="6" onclick="toggleDay(this)">Sa</button>
        </div>
      </div>

    </div>
    <div class="wf-modal-footer">
      <button class="wf-btn wf-btn-ghost wf-btn-sm" onclick="closeModal()">Cancel</button>
      <button class="wf-btn wf-btn-filled wf-btn-sm" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script>
/* ── State ── */
let lists = JSON.parse(localStorage.getItem('lt-lists') || '["All","Personal","Work"]');
let tasks = JSON.parse(localStorage.getItem('lt-tasks') || '[]');
let active = 'All', editId = null, hideDone = false;
let swReg = null;

const persist = () => {
  localStorage.setItem('lt-lists', JSON.stringify(lists));
  localStorage.setItem('lt-tasks', JSON.stringify(tasks));
};

/* ── Service Worker ── */
async function initSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    swReg = await navigator.serviceWorker.register('/main/sw.js');
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'MARK_DONE') {
        const t = tasks.find(x => x.id === e.data.id);
        if (t && !t.done) { t.done = true; persist(); renderTasks(); }
      }
    });
  } catch(err) { console.warn('SW reg failed:', err); }
}

/* ── Schedule notifications via SW ── */
function scheduleAll() {
  tasks.forEach(t => scheduleSW(t));
}

function scheduleSW(t) {
  if (!t.remind || t.done) return;
  const ms = new Date(t.remind).getTime() - Date.now();
  if (ms <= 0) return;
  if (Notification.permission !== 'granted') return;
  const sw = navigator.serviceWorker?.controller;
  if (!sw) return;
  sw.postMessage({ type: 'SCHEDULE', task: { id: t.id, title: t.title, desc: t.desc }, delay: ms });
}

/* ── Repeat: advance reminder to next occurrence ── */
function advanceRepeat(t) {
  if (!t.repeat || t.repeat === 'none' || !t.remind) return;
  const d = new Date(t.remind);
  switch (t.repeat) {
    case 'daily':    d.setDate(d.getDate() + 1); break;
    case 'weekdays':
      do { d.setDate(d.getDate() + 1); } while ([0,6].includes(d.getDay()));
      break;
    case 'weekly':   d.setDate(d.getDate() + 7); break;
    case 'monthly':  d.setMonth(d.getMonth() + 1); break;
    case 'custom': {
      const days = t.repeatDays || [];
      if (!days.length) return;
      let next = new Date(d); next.setDate(next.getDate() + 1);
      for (let i = 0; i < 7; i++) {
        if (days.includes(next.getDay())) break;
        next.setDate(next.getDate() + 1);
      }
      d.setTime(next.getTime()); break;
    }
  }
  t.remind = d.toISOString().slice(0,16);
  t.done = false; // reset done for repeating tasks
  persist(); scheduleSW(t);
}

/* ── Toggle hide completed ── */
function toggleHide() {
  hideDone = !hideDone;
  document.getElementById('hide-icon').textContent = hideDone ? '+' : '−';
  document.getElementById('hide-btn').classList.toggle('active', hideDone);
  renderTasks();
}

/* ── Lists ── */
function renderLists() {
  const bar = document.getElementById('lists-bar');
  bar.querySelectorAll('.list-pill').forEach(e => e.remove());
  const btn = document.getElementById('add-list-btn');
  lists.forEach(l => {
    const p = document.createElement('div');
    p.className = 'list-pill' + (l === active ? ' active' : '');
    p.innerHTML = esc(l) + (l !== 'All'
      ? ' <span class="list-pill-del" data-list="' + esc(l) + '">✕</span>' : '');
    p.querySelector('.list-pill-del')?.addEventListener('click', e => {
      e.stopPropagation(); delList(e.target.dataset.list);
    });
    p.addEventListener('click', () => switchList(l));
    bar.insertBefore(p, btn);
  });
  syncListSel();
}
function switchList(l) { active = l; renderLists(); renderTasks(); }
function promptList() {
  const n = prompt('List name:');
  if (n && n.trim() && !lists.includes(n.trim())) {
    lists.push(n.trim()); persist(); renderLists();
  }
}
function delList(l) {
  if (!confirm('Delete "' + l + '"? Tasks will move to Personal.')) return;
  tasks.forEach(t => { if (t.list === l) t.list = 'Personal'; });
  lists = lists.filter(x => x !== l);
  if (active === l) active = 'All';
  persist(); renderLists(); renderTasks();
}
function syncListSel() {
  const s = document.getElementById('m-list');
  s.innerHTML = lists.filter(l => l !== 'All')
    .map(l => '<option value="' + esc(l) + '">' + esc(l) + '</option>').join('');
}

/* ── Tasks ── */
const prioClass = { high:'ph', med:'pm', low:'pl', none:'' };
const prioLabel = { high:'High', med:'Medium', low:'Low', none:'' };
const repeatLabel = { daily:'Daily', weekdays:'Weekdays', weekly:'Weekly', monthly:'Monthly', custom:'Custom', none:'' };

function renderTasks() {
  const c = document.getElementById('task-list');
  let vs = tasks.filter(t => active === 'All' || t.list === active);
  const allVs = vs;
  if (hideDone) vs = vs.filter(t => !t.done);
  vs.sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const o = { high:0, med:1, low:2, none:3 };
    return (o[a.prio]??3) - (o[b.prio]??3);
  });
  c.innerHTML = '';

  // Hidden hint
  let hint = document.getElementById('hidden-hint');
  if (hint) hint.remove();
  const hiddenCount = allVs.filter(t => t.done).length;
  if (hideDone && hiddenCount > 0) {
    const h = document.createElement('div');
    h.id = 'hidden-hint'; h.className = 'wf-caption wf-text-center';
    h.style.padding = 'var(--space-3) 0';
    h.textContent = hiddenCount + ' completed task' + (hiddenCount > 1 ? 's' : '') + ' hidden';
    c.after(h);
  }

  document.getElementById('empty').classList.toggle('show', !allVs.length);
  const total = tasks.length, done = tasks.filter(t=>t.done).length;
  document.getElementById('task-count').textContent = done + '/' + total + ' done';

  vs.forEach(t => {
    const d = document.createElement('div');
    d.className = 'task-item' + (t.done ? ' done' : '');
    const rl = t.repeat && t.repeat !== 'none' ? repeatLabel[t.repeat] || t.repeat : '';
    d.innerHTML =
      '<input type="checkbox" class="task-check" ' + (t.done?'checked':'') + ' />' +
      '<div class="task-body">' +
        '<div class="task-title">' + esc(t.title) + '</div>' +
        (t.desc ? '<div class="task-desc">' + esc(t.desc) + '</div>' : '') +
        '<div class="task-meta">' +
          (t.prio !== 'none' ? '<span class="prio-dot ' + prioClass[t.prio] + '"></span><span class="wf-caption">' + prioLabel[t.prio] + '</span>' : '') +
          (t.remind ? '<span class="remind-chip">🔔 ' + fmt(t.remind) + '</span>' : '') +
          (rl ? '<span class="repeat-chip">🔁 ' + rl + '</span>' : '') +
          (t.list && t.list !== 'All' ? '<span class="wf-chip wf-chip-default" style="padding:2px 8px;font-size:10px;">' + esc(t.list) + '</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="task-actions">' +
        '<button class="tact" data-tooltip="Edit">✏️</button>' +
        '<button class="tact del" data-tooltip="Delete">🗑️</button>' +
      '</div>';
    d.querySelector('.task-check').addEventListener('change', () => toggle(t.id));
    d.querySelectorAll('.tact')[0].addEventListener('click', () => openModal(t.id));
    d.querySelectorAll('.tact')[1].addEventListener('click', () => del(t.id));
    c.appendChild(d);
  });
}

function toggle(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done && t.repeat && t.repeat !== 'none') {
    // Schedule next repeat then reset done after a tick so user sees it check
    setTimeout(() => { advanceRepeat(t); persist(); renderTasks(); }, 800);
  }
  persist(); renderTasks();
}
function del(id) {
  tasks = tasks.filter(x => x.id !== id);
  persist(); renderTasks();
}

/* ── Add ── */
function quickAdd() {
  const inp = document.getElementById('task-input');
  const title = inp.value.trim();
  if (!title) return;
  push({ title, desc:'', prio:'none', list: active === 'All' ? (lists[1] || 'All') : active, remind:'', repeat:'none', repeatDays:[] });
  inp.value = '';
}
function push(data) {
  const t = { id: Date.now().toString(), done:false, ...data };
  tasks.unshift(t); scheduleSW(t); persist(); renderTasks();
}

/* ── Modal ── */
function toggleRepeatDays() {
  const v = document.getElementById('m-repeat').value;
  document.getElementById('repeat-days-row').classList.toggle('wf-hidden', v !== 'custom');
}
function toggleDay(btn) { btn.classList.toggle('on'); }
function getSelectedDays() {
  return [...document.querySelectorAll('.day-btn.on')].map(b => +b.dataset.d);
}
function setSelectedDays(days) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('on', (days||[]).includes(+b.dataset.d)));
}

function openModal(id) {
  editId = id || null;
  document.getElementById('modal-ttl').textContent = id ? 'Edit Task' : 'New Task';
  syncListSel();
  if (id) {
    const t = tasks.find(x => x.id === id);
    document.getElementById('m-title').value = t.title;
    document.getElementById('m-desc').value = t.desc || '';
    document.getElementById('m-prio').value = t.prio || 'none';
    document.getElementById('m-remind').value = t.remind || '';
    document.getElementById('m-list').value = t.list || '';
    document.getElementById('m-repeat').value = t.repeat || 'none';
    setSelectedDays(t.repeatDays || []);
  } else {
    document.getElementById('m-title').value = document.getElementById('task-input').value.trim();
    document.getElementById('m-desc').value = '';
    document.getElementById('m-prio').value = 'none';
    document.getElementById('m-remind').value = '';
    document.getElementById('m-repeat').value = 'none';
    setSelectedDays([]);
  }
  toggleRepeatDays();
  document.getElementById('task-modal').classList.remove('wf-hidden');
  updateNotifStatus();
  setTimeout(() => document.getElementById('m-title').focus(), 60);
}
function closeModal() {
  document.getElementById('task-modal').classList.add('wf-hidden'); editId = null;
}
function saveTask() {
  const el = document.getElementById('m-title');
  const title = el.value.trim();
  if (!title) { el.classList.add('error'); el.focus(); return; }
  el.classList.remove('error');
  const data = {
    title, desc: document.getElementById('m-desc').value.trim(),
    prio: document.getElementById('m-prio').value,
    list: document.getElementById('m-list').value || 'All',
    remind: document.getElementById('m-remind').value,
    repeat: document.getElementById('m-repeat').value,
    repeatDays: getSelectedDays(),
  };
  if (editId) {
    Object.assign(tasks.find(x => x.id === editId), data);
    scheduleSW(tasks.find(x => x.id === editId));
  } else {
    push(data);
    document.getElementById('task-input').value = '';
  }
  persist(); closeModal(); renderTasks();
}

/* ── Notifications ── */
function updateNotifStatus() {
  const el = document.getElementById('notif-status');
  const btn = document.getElementById('notif-btn');
  const p = Notification.permission;
  el.textContent = p === 'granted' ? '✅ Enabled' : p === 'denied' ? '❌ Blocked in browser' : '⚠️ Not yet enabled';
  el.className = 'notif-row-status wf-helper' + (p === 'granted' ? ' success' : p === 'denied' ? ' error' : '');
  btn.textContent = p === 'granted' ? 'On ✓' : 'Enable';
  btn.disabled = p === 'denied';
  btn.className = 'wf-btn wf-btn-sm ' + (p === 'granted' ? 'wf-btn-tonal' : 'wf-btn-filled');
}
async function reqNotif() {
  if (!('Notification' in window)) { alert('Notifications not supported.'); return; }
  if (Notification.permission === 'granted') return;
  await Notification.requestPermission();
  updateNotifStatus();
  if (Notification.permission === 'granted') scheduleAll();
}

/* ── Backup & Restore ── */
function backup() {
  const data = JSON.stringify({ lists, tasks }, null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([data], { type: 'application/json' }));
  a.download = 'leprTodo-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function restore(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!Array.isArray(d.lists) || !Array.isArray(d.tasks)) throw new Error();
      if (!confirm('Restore will replace all current data. Continue?')) return;
      lists = d.lists; tasks = d.tasks;
      persist(); renderLists(); renderTasks(); scheduleAll();
    } catch { alert('Invalid backup file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ── Utils ── */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric' })
    + ' ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
}

/* ── Boot ── */
initSW().then(() => {
  renderLists(); renderTasks();
  if (Notification.permission === 'granted') scheduleAll();
});
</script>
